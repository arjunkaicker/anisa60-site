<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Party">
  <defs>
    <radialGradient id="haloOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#8c6f24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haloInner" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f3dc94" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#c9a961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9e8b6"/>
      <stop offset="45%" stop-color="#e6c878"/>
      <stop offset="100%" stop-color="#8c6f24"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f3dc94" stop-opacity="0"/>
    </radialGradient>

    <!-- Reusable larger sparkle -->
    <g id="sparkle">
      <circle r="6" fill="url(#sparkleGrad)"/>
      <path d="M 0 -14 L 1.2 -2 L 14 0 L 1.2 2 L 0 14 L -1.2 2 L -14 0 L -1.2 -2 Z" fill="#fff8e0" opacity="0.9"/>
    </g>
  </defs>

  <!-- Black backdrop -->
  <rect width="600" height="500" fill="#000000"/>

  <!-- Soft halo glow behind glitter -->
  <ellipse cx="300" cy="250" rx="290" ry="220" fill="url(#haloOuter)"/>
  <ellipse cx="300" cy="250" rx="220" ry="170" fill="url(#haloInner)"/>

  <!-- Dense glitter dots clustered around centre, with falloff -->
  <g fill="#f3dc94" filter="url(#glow)">
    <!-- inner-dense ring -->
    <circle cx="252" cy="178" r="3" opacity="0.95"/>
    <circle cx="280" cy="155" r="2.2" opacity="0.85"/>
    <circle cx="320" cy="172" r="2.6" opacity="0.9"/>
    <circle cx="358" cy="192" r="2" opacity="0.75"/>
    <circle cx="232" cy="206" r="2.4" opacity="0.85"/>
    <circle cx="378" cy="222" r="3.1" opacity="0.92"/>
    <circle cx="208" cy="240" r="2.6" opacity="0.8"/>
    <circle cx="392" cy="260" r="2" opacity="0.85"/>
    <circle cx="195" cy="280" r="2.2" opacity="0.85"/>
    <circle cx="402" cy="298" r="2.8" opacity="0.88"/>
    <circle cx="222" cy="320" r="2.6" opacity="0.85"/>
    <circle cx="372" cy="328" r="2.4" opacity="0.85"/>
    <circle cx="252" cy="340" r="2" opacity="0.85"/>
    <circle cx="346" cy="345" r="3.2" opacity="0.95"/>
    <circle cx="294" cy="346" r="2.6" opacity="0.85"/>

    <!-- mid scatter -->
    <circle cx="172" cy="160" r="1.8" opacity="0.75"/>
    <circle cx="412" cy="150" r="2.4" opacity="0.85"/>
    <circle cx="156" cy="220" r="2.2" opacity="0.75"/>
    <circle cx="438" cy="218" r="2" opacity="0.7"/>
    <circle cx="142" cy="280" r="2.4" opacity="0.75"/>
    <circle cx="452" cy="280" r="2.2" opacity="0.8"/>
    <circle cx="162" cy="340" r="2.6" opacity="0.8"/>
    <circle cx="438" cy="345" r="2.2" opacity="0.75"/>
    <circle cx="208" cy="380" r="2" opacity="0.75"/>
    <circle cx="394" cy="382" r="2.8" opacity="0.85"/>
    <circle cx="262" cy="395" r="1.8" opacity="0.65"/>
    <circle cx="336" cy="398" r="2.4" opacity="0.78"/>
    <circle cx="248" cy="130" r="2.2" opacity="0.78"/>
    <circle cx="352" cy="125" r="2" opacity="0.78"/>
    <circle cx="300" cy="118" r="2.6" opacity="0.85"/>

    <!-- outer faint scatter -->
    <circle cx="98" cy="180" r="1.6" opacity="0.55"/>
    <circle cx="118" cy="260" r="1.4" opacity="0.5"/>
    <circle cx="100" cy="320" r="1.8" opacity="0.6"/>
    <circle cx="490" cy="180" r="1.6" opacity="0.55"/>
    <circle cx="498" cy="260" r="1.4" opacity="0.5"/>
    <circle cx="488" cy="330" r="1.8" opacity="0.6"/>
    <circle cx="180" cy="100" r="1.2" opacity="0.5"/>
    <circle cx="220" cy="86" r="1.6" opacity="0.55"/>
    <circle cx="280" cy="78" r="1.4" opacity="0.5"/>
    <circle cx="340" cy="82" r="1.8" opacity="0.6"/>
    <circle cx="396" cy="92" r="1.4" opacity="0.5"/>
    <circle cx="420" cy="108" r="1.2" opacity="0.45"/>
    <circle cx="180" cy="408" r="1.4" opacity="0.5"/>
    <circle cx="220" cy="420" r="1.8" opacity="0.6"/>
    <circle cx="282" cy="430" r="1.6" opacity="0.55"/>
    <circle cx="340" cy="425" r="1.4" opacity="0.5"/>
    <circle cx="396" cy="412" r="1.8" opacity="0.6"/>
    <circle cx="430" cy="395" r="1.4" opacity="0.5"/>

    <!-- micro sparkles inside the cluster -->
    <circle cx="240" cy="240" r="1" opacity="0.7"/>
    <circle cx="266" cy="265" r="1.2" opacity="0.75"/>
    <circle cx="288" cy="225" r="0.9" opacity="0.65"/>
    <circle cx="312" cy="248" r="1.1" opacity="0.7"/>
    <circle cx="334" cy="218" r="1" opacity="0.7"/>
    <circle cx="350" cy="270" r="1.3" opacity="0.75"/>
    <circle cx="376" cy="248" r="0.9" opacity="0.65"/>
    <circle cx="226" cy="298" r="1.2" opacity="0.7"/>
    <circle cx="264" cy="318" r="1" opacity="0.7"/>
    <circle cx="320" cy="318" r="1.4" opacity="0.8"/>
    <circle cx="364" cy="298" r="1.1" opacity="0.7"/>
    <circle cx="278" cy="200" r="1" opacity="0.7"/>
    <circle cx="316" cy="200" r="1.2" opacity="0.75"/>
    <circle cx="358" cy="170" r="0.9" opacity="0.65"/>
  </g>

  <!-- A few cross-style sparkles for highlights -->
  <use href="#sparkle" transform="translate(190 200) scale(0.85)"/>
  <use href="#sparkle" transform="translate(410 195) scale(0.75)"/>
  <use href="#sparkle" transform="translate(220 350) scale(0.7)"/>
  <use href="#sparkle" transform="translate(395 345) scale(0.85)"/>
  <use href="#sparkle" transform="translate(305 110) scale(0.6)"/>

  <!-- PARTY text -->
  <text x="300" y="285" text-anchor="middle"
        font-family="'Bebas Neue', 'Oswald', 'Impact', sans-serif"
        font-size="130" font-weight="400"
        fill="url(#goldText)"
        letter-spacing="6"
        style="paint-order: stroke fill;">PARTY</text>
</svg>
